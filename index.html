<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medication Tracker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fa;
    padding: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 25px;
}

.med-card {
    background: #ffffff;
    border-left: 8px solid #9ca3af;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 3px 12px rgba(0,0,0,.08);
    transition: .3s;
}

.med-card.ready {
    border-left-color: #22c55e;
}

.med-card.given {
    border-left-color: #15803d;
    background: #ecfdf5;
}

.med-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.med-name {
    font-size: 20px;
    font-weight: bold;
}

.status {
    font-weight: bold;
}

.ready .status {
    color: #22c55e;
}

.given .status {
    color: #15803d;
}

.pending .status {
    color: #6b7280;
}

.med-details {
    margin-top: 10px;
    color: #555;
}

.controls {
    margin-top: 15px;
}

button {
    background: #22c55e;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}

.time-given {
    margin-top: 10px;
    color: #15803d;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>Medication Administration Tracker</h1>

    <div class="med-card ready pending" id="med1">

        <div class="med-header">
            <span class="med-name">Pantoprazole (Protonix) 40mg</span>
             <span class="instructions">Give 1 tablet in the morning</span>
            <span class="status">READY</span>
        </div>

        <div class="med-details">
            Scheduled Time: 7:00 AM
        </div>

        <div class="controls">
            <button onclick="giveMedication('med1')">
                Mark as Given
            </button>
        </div>

        <div class="time-given"></div>

    </div>

    <div class="med-card pending" id="med2">

        <div class="med-header">
            <span class="med-name">Vitamin D</span>
            <span class="status">PENDING</span>
        </div>

        <div class="med-details">
            Scheduled Time: 12:00 PM
        </div>

        <div class="controls">
            <button onclick="giveMedication('med2')">
                Mark as Given
            </button>
        </div>

        <div class="time-given"></div>

    </div>

</div>

<script>

function giveMedication(id) {

    const card = document.getElementById(id);

    card.classList.remove('pending');
    card.classList.add('given');

    card.querySelector('.status').textContent = 'GIVEN';

    const timestamp = new Date().toLocaleTimeString();

    card.querySelector('.time-given').textContent =
        'Administered: ' + timestamp;

}

</script>

</body>
</html>
